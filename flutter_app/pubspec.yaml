name: ledger_flow
description: A modern accounting and inventory management application.

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI & Design
  cupertino_icons: ^1.0.2
  google_fonts: ^6.1.0
  flutter_animate: ^4.2.0
  badges: ^3.1.2

  # State Management
  provider: ^6.0.0
  riverpod: ^2.4.0
  riverpod_generator: ^2.3.0

  # Authentication
  firebase_auth: ^4.10.0
  google_sign_in: ^6.1.5
  sign_in_with_apple: ^5.0.0

  # Database & Storage
  firebase_core: ^2.16.0
  firebase_database: ^10.2.0
  firebase_firestore: ^4.13.0
  firebase_storage: ^11.2.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # API & Networking
  dio: ^5.3.1
  retrofit: ^4.1.0
  pretty_dio_logger: ^1.3.1

  # Notifications & Email
  firebase_messaging: ^14.6.0
  email_validator: ^2.1.17

  # Date & Time
  intl: ^0.19.0
  table_calendar: ^3.0.9

  # Forms & Validation
  flutter_form_builder: ^8.0.0
  form_builder_validators: ^10.0.0

  # Charts & Analytics
  fl_chart: ^0.64.0
  syncfusion_flutter_charts: ^23.1.36

  # PDF & File Export
  pdf: ^3.10.4
  printing: ^5.11.0
  excel: ^2.1.2

  # Localization
  flutter_localizations:
    sdk: flutter

  # Utilities
  uuid: ^4.0.0
  logger: ^2.0.1
  shared_preferences: ^2.2.2
  connectivity_plus: ^5.0.0
  image_picker: ^1.0.0
  permission_handler: ^11.4.4

  # Platform-specific
  flutter_platform_channels: ^0.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_linter: ^3.0.0
  build_runner: ^2.4.6
  riverpod_generator: ^2.3.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Light.ttf
          weight: 300
        - asset: assets/fonts/Poppins-Regular.ttf
          weight: 400
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
          weight: 400
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700